name: spec-governance-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-spec-governance:
    name: verify-spec-governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch main baseline
        run: git fetch --no-tags --prune --depth=1 origin main

      - name: Run spec governance gate
        run: npm run verify:spec-governance
